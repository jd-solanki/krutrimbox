name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release
  id-token: write # npm provenance OIDC

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # changelogithub needs full history to diff tags

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org # writes .npmrc so NODE_AUTH_TOKEN is used
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build CLI
        run: pnpm build

      - name: Publish package
        run: npm publish --access public

      - name: Generate GitHub release + changelog
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
